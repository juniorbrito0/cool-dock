name: CoolDock
options:
  bundleIdPrefix: ai.brito
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: YDC59VMG55
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES
targets:
  CoolDock:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.brito.cooldock
        PRODUCT_NAME: Dock+
        # Xcode's Debug Dylib split runs app code from Dock+.debug.dylib, which lacks the app's
        # Info.plist — EventKit reads the caller's usage strings there and silently refuses the
        # calendar request. Ship a single binary so TCC sees the real Info.plist.
        ENABLE_DEBUG_DYLIB: "NO"
        INFOPLIST_FILE: Sources/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APP_SANDBOX: NO
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
